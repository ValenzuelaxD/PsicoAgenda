name: Deploy Backend to Cloud Run

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    env:
      GCP_PROJECT_ID: "psicoagenda-489800"
      GCP_REGION: "us-central1"
      CLOUD_RUN_SERVICE: "psicoagenda-api"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Auth to Google Cloud (WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: Deploy service to Cloud Run
        run: |
          gcloud run deploy "${{ env.CLOUD_RUN_SERVICE }}" \
            --source ./server \
            --project "${{ env.GCP_PROJECT_ID }}" \
            --region "${{ env.GCP_REGION }}" \
            --allow-unauthenticated \
            --set-env-vars "DB_USER=${{ secrets.DB_USER }},DB_HOST=${{ secrets.DB_HOST }},DB_DATABASE=${{ secrets.DB_DATABASE }},DB_PORT=${{ secrets.DB_PORT }},ENABLE_ZOOM_INTEGRATION=${{ vars.ENABLE_ZOOM_INTEGRATION }},ZOOM_ACCOUNT_ID=${{ vars.ZOOM_ACCOUNT_ID }},ZOOM_CLIENT_ID=${{ vars.ZOOM_CLIENT_ID }},ZOOM_USER_ID=${{ vars.ZOOM_USER_ID }},ZOOM_HTTP_TIMEOUT_MS=${{ vars.ZOOM_HTTP_TIMEOUT_MS }},ENABLE_EMAIL_INTEGRATION=${{ vars.ENABLE_EMAIL_INTEGRATION }},SMTP_HOST=${{ vars.SMTP_HOST }},SMTP_PORT=${{ vars.SMTP_PORT }},SMTP_SECURE=${{ vars.SMTP_SECURE }},SMTP_USER=${{ vars.SMTP_USER }},SMTP_TLS_REJECT_UNAUTHORIZED=${{ vars.SMTP_TLS_REJECT_UNAUTHORIZED }},MAIL_FROM_NAME=${{ vars.MAIL_FROM_NAME }},MAIL_FROM_ADDRESS=${{ vars.MAIL_FROM_ADDRESS }},MAIL_SUPPORT_ADDRESS=${{ vars.MAIL_SUPPORT_ADDRESS }},APP_WEB_URL=${{ vars.APP_WEB_URL }},APP_TIMEZONE=${{ vars.APP_TIMEZONE }}" \
            --set-secrets "DB_PASSWORD=psicoagenda-db-password:latest,JWT_SECRET=psicoagenda-jwt-secret:latest,ZOOM_CLIENT_SECRET=psicoagenda-zoom-client-secret:latest,SMTP_PASS=psicoagenda-smtp-pass:latest"
